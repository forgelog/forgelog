appId: dev.bishnoi.forgelog.mobile
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- runFlow:
    commands:
      - extendedWaitUntil:
          visible: "What should we call you?"
          timeout: 60000
      - tapOn:
          id: "onboarding-name-input"
      - inputText: "ForgeLog Tester"
      - pressKey: back
      - scrollUntilVisible:
          element:
            id: "onboarding-continue"
          direction: DOWN
      - tapOn:
          id: "onboarding-continue"
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
- tapOn:
    point: "83%,96%"
- extendedWaitUntil:
    visible: "Personal Records"
    timeout: 60000
- tapOn: "Edit profile"
- extendedWaitUntil:
    visible: "Edit Profile"
    timeout: 60000
- tapOn:
    id: "profile-name-input"
- eraseText: 100
- inputText: "Phase Five Lifter"
- tapOn: "Select Female sex"
- tapOn:
    id: "profile-height-input"
- eraseText: 20
- inputText: "172"
- tapOn:
    id: "profile-bodyweight-input"
- eraseText: 20
- inputText: "74"
- tapOn: "Save profile"
- extendedWaitUntil:
    visible: "Body"
    timeout: 60000
- assertVisible: "Phase Five Lifter"
- assertVisible: "Female"
- assertVisible: "172 cm"
- assertVisible: "74 kg"
