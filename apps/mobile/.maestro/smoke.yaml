appId: dev.bishnoi.forgelog.mobile
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
- assertVisible: "History"
- assertVisible: "Profile"
