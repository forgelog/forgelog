appId: dev.bishnoi.forgelog.mobile
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- runFlow:
    commands:
      - extendedWaitUntil:
          visible: "What should we call you?"
          timeout: 60000
      - tapOn:
          id: "onboarding-name-input"
      - inputText: "ForgeLog Tester"
      - pressKey: back
      - scrollUntilVisible:
          element:
            id: "onboarding-continue"
          direction: DOWN
      - tapOn:
          id: "onboarding-continue"
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
- assertVisible: "History"
- assertVisible: "Profile"
