appId: dev.bishnoi.forgelog.mobile
tags:
  - migration
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
# v0.1.x exposed only the plus icon glyph, so this compatibility seed flow uses
# a point tap for the old create-routine button. Prefer semantic selectors below.
- tapOn:
    point: "92%,22%"
- extendedWaitUntil:
    visible: "Edit routine"
    timeout: 60000
- tapOn: "+ Add Exercise"
- extendedWaitUntil:
    visible: "Search exercises"
    timeout: 60000
- tapOn: "Search exercises"
- inputText: "barbell bench press"
- extendedWaitUntil:
    visible: "Barbell Bench Press - Medium Grip"
    timeout: 60000
- tapOn: "Barbell Bench Press - Medium Grip"
- extendedWaitUntil:
    visible: "Edit routine"
    timeout: 60000
- tapOn: "+ Add set"
- tapOn: "kg"
- inputText: "70"
- tapOn: "reps"
- inputText: "6"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "My Routines"
    timeout: 60000
- tapOn: "Start"
- extendedWaitUntil:
    visible: "New Routine"
    timeout: 60000
- tapOn:
    point: "86%,32%"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- tapOn: "Finish"
- extendedWaitUntil:
    visible: "Finish workout"
    timeout: 60000
- tapOn: "Finish"
- extendedWaitUntil:
    visible: "My Routines"
    timeout: 60000
