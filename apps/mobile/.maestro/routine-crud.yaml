appId: dev.bishnoi.forgelog.mobile
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
- tapOn:
    id: "create-routine"
- extendedWaitUntil:
    visible: "Edit routine"
    timeout: 60000
- tapOn:
    id: "routine-add-exercise"
- extendedWaitUntil:
    visible: "Search exercises"
    timeout: 60000
- tapOn:
    id: "exercise-search-input"
- inputText: "barbell bench press"
- extendedWaitUntil:
    visible: "Select Barbell Bench Press - Medium Grip"
    timeout: 60000
- tapOn: "Select Barbell Bench Press - Medium Grip"
- extendedWaitUntil:
    visible: "Barbell Bench Press - Medium Grip"
    timeout: 60000
- tapOn:
    id: "routine-exercise-0-add-set"
- tapOn:
    id: "routine-set-0-0-weight"
- inputText: "80"
- tapOn:
    id: "routine-set-0-0-reps"
- inputText: "8"
- tapOn: "Save"
- runFlow:
    when:
      visible: "Edit routine"
    commands:
      - tapOn: "Save"
- extendedWaitUntil:
    visible: "My Routines"
    timeout: 60000
- assertVisible: "New Routine"
- tapOn: "Delete routine New Routine"
- extendedWaitUntil:
    visible: "Delete routine"
    timeout: 60000
- tapOn: "Delete"
- extendedWaitUntil:
    visible: "No routines yet. Create one above."
    timeout: 60000
