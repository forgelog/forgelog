appId: dev.bishnoi.forgelog.mobile
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Pixel Launcher isn't responding"
    commands:
      - tapOn: "Close app"
- runFlow:
    when:
      visible: "Continue"
    file: "complete-onboarding.yaml"
- extendedWaitUntil:
    visible: "Workout"
    timeout: 60000
- tapOn:
    id: "create-routine"
- extendedWaitUntil:
    visible: "Create Routine"
    timeout: 60000
- tapOn:
    id: "routine-name-input"
- inputText: "New Routine"
- tapOn: "+ Add Exercise"
- runFlow:
    when:
      visible: "Create Routine"
    commands:
      - tapOn:
          id: "routine-add-exercise"
- extendedWaitUntil:
    visible: "Search exercises"
    timeout: 60000
- tapOn:
    id: "exercise-search-input"
- inputText: "barbell bench press"
- extendedWaitUntil:
    visible: "Select Barbell Bench Press - Medium Grip"
    timeout: 60000
- tapOn: "Select Barbell Bench Press - Medium Grip"
- extendedWaitUntil:
    visible: "Barbell Bench Press - Medium Grip"
    timeout: 60000
- tapOn:
    id: "routine-exercise-0-add-set"
- tapOn:
    id: "routine-set-0-0-weight"
- inputText: "80"
- tapOn:
    id: "routine-set-0-0-reps"
- inputText: "8"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "My Routines"
    timeout: 60000
- assertVisible: "New Routine"
- tapOn: "Routine options New Routine"
- extendedWaitUntil:
    visible: "Delete Routine"
    timeout: 60000
- tapOn:
    id: "routine-action-delete"
- extendedWaitUntil:
    visible: "Delete this routine?"
    timeout: 60000
- tapOn:
    id: "routine-delete-confirm"
- extendedWaitUntil:
    visible: "No routines yet. Create one above."
    timeout: 60000
