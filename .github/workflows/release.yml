name: Release

on:
  workflow_run:
    workflows: [Mobile, Wear OS]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  # workflow_run fires once per listed workflow, independently. Only proceed
  # once *both* Mobile and Wear OS have reached a terminal state (success,
  # failure, or cancelled) for this commit — otherwise the first one to
  # finish would race ahead of the other's artifacts.
  check-ready:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check both workflows are done for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          mobile_status=$(gh api "repos/${{ github.repository }}/actions/workflows/mobile.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].status // "missing"')
          wear_status=$(gh api "repos/${{ github.repository }}/actions/workflows/wearos.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].status // "missing"')
          echo "mobile=$mobile_status wear=$wear_status"
          if [ "$mobile_status" = "completed" ] && [ "$wear_status" = "completed" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-ready
    if: needs.check-ready.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Determine release version
        id: version
        run: |
          VERSION=$(jq -r '.expo.version' apps/mobile/app.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download mobile debug APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-debug-apk
          path: artifacts/mobile-debug
          if_no_artifact_found: ignore

      - name: Download mobile release APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-release-apk
          path: artifacts/mobile-release
          if_no_artifact_found: ignore

      - name: Download wear OS debug APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-wear-debug-apk
          path: artifacts/wear-debug
          if_no_artifact_found: ignore

      - name: Download wear OS release APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-wear-release-apk
          path: artifacts/wear-release
          if_no_artifact_found: ignore

      - name: Download mobile release AAB
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-release-aab
          path: artifacts/mobile-release-aab
          if_no_artifact_found: ignore

      - name: Download wear OS release AAB
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          branch: main
          workflow_conclusion: success
          name: forgelog-wear-release-aab
          path: artifacts/wear-release-aab
          if_no_artifact_found: ignore

      - name: Flatten and rename APKs/AABs
        run: |
          mkdir -p release-apks
          [ -f artifacts/mobile-debug/app-debug.apk ] && cp artifacts/mobile-debug/app-debug.apk release-apks/forgelog-mobile-debug.apk
          [ -f artifacts/mobile-release/app-release.apk ] && cp artifacts/mobile-release/app-release.apk release-apks/forgelog-mobile-release.apk
          [ -f artifacts/wear-debug/app-debug.apk ] && cp artifacts/wear-debug/app-debug.apk release-apks/forgelog-wear-debug.apk
          [ -f artifacts/wear-release/app-release.apk ] && cp artifacts/wear-release/app-release.apk release-apks/forgelog-wear-release.apk
          [ -f artifacts/mobile-release-aab/app-release.aab ] && cp artifacts/mobile-release-aab/app-release.aab release-apks/forgelog-mobile-release.aab
          [ -f artifacts/wear-release-aab/app-release.aab ] && cp artifacts/wear-release-aab/app-release.aab release-apks/forgelog-wear-release.aab
          ls -la release-apks

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: Build from main at ${{ github.sha }}.
          artifacts: release-apks/*.apk,release-apks/*.aab
          allowUpdates: true
          makeLatest: true
          commit: main
