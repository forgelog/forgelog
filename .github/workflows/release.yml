name: Release

on:
  workflow_run:
    workflows: [Mobile, Wear OS]
    branches: [main]
    types: [completed]

permissions:
  actions: read

jobs:
  # workflow_run fires once per listed workflow, independently. Only proceed
  # once *both* Mobile and Wear OS have succeeded for this commit — otherwise
  # the first one to finish would race ahead of the other's artifacts.
  check-ready:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.head_branch == 'main'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      mobile_run_id: ${{ steps.check.outputs.mobile_run_id }}
      wear_run_id: ${{ steps.check.outputs.wear_run_id }}
    steps:
      - name: Check both workflows succeeded for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          mobile_run=$(gh api "repos/${{ github.repository }}/actions/workflows/mobile.yml/runs?head_sha=$HEAD_SHA&per_page=1")
          wear_run=$(gh api "repos/${{ github.repository }}/actions/workflows/wearos.yml/runs?head_sha=$HEAD_SHA&per_page=1")

          mobile_conclusion=$(echo "$mobile_run" | jq -r '.workflow_runs[0].conclusion // "missing"')
          wear_conclusion=$(echo "$wear_run" | jq -r '.workflow_runs[0].conclusion // "missing"')
          mobile_run_id=$(echo "$mobile_run" | jq -r '.workflow_runs[0].id // ""')
          wear_run_id=$(echo "$wear_run" | jq -r '.workflow_runs[0].id // ""')

          echo "mobile=$mobile_conclusion wear=$wear_conclusion"
          echo "mobile_run_id=$mobile_run_id" >> "$GITHUB_OUTPUT"
          echo "wear_run_id=$wear_run_id" >> "$GITHUB_OUTPUT"

          if [ "$mobile_conclusion" = "success" ] && [ "$wear_conclusion" = "success" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-ready
    if: needs.check-ready.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Determine release version
        id: version
        run: |
          VERSION=$(jq -r '.expo.version' apps/mobile/app.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download mobile debug APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          run_id: ${{ needs.check-ready.outputs.mobile_run_id }}
          name: forgelog-debug-apk
          path: artifacts/mobile-debug

      - name: Download mobile release APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          run_id: ${{ needs.check-ready.outputs.mobile_run_id }}
          name: forgelog-release-apk
          path: artifacts/mobile-release

      - name: Download wear OS debug APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          run_id: ${{ needs.check-ready.outputs.wear_run_id }}
          name: forgelog-wear-debug-apk
          path: artifacts/wear-debug

      - name: Download wear OS release APK
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          run_id: ${{ needs.check-ready.outputs.wear_run_id }}
          name: forgelog-wear-release-apk
          path: artifacts/wear-release

      - name: Download mobile release AAB
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: mobile.yml
          run_id: ${{ needs.check-ready.outputs.mobile_run_id }}
          name: forgelog-release-aab
          path: artifacts/mobile-release-aab

      - name: Download wear OS release AAB
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wearos.yml
          run_id: ${{ needs.check-ready.outputs.wear_run_id }}
          name: forgelog-wear-release-aab
          path: artifacts/wear-release-aab

      - name: Flatten and rename APKs/AABs
        run: |
          mkdir -p release-apks
          [ -f artifacts/mobile-debug/app-debug.apk ] && cp artifacts/mobile-debug/app-debug.apk release-apks/forgelog-mobile-debug.apk
          [ -f artifacts/mobile-release/app-release.apk ] && cp artifacts/mobile-release/app-release.apk release-apks/forgelog-mobile-release.apk
          [ -f artifacts/wear-debug/app-debug.apk ] && cp artifacts/wear-debug/app-debug.apk release-apks/forgelog-wear-debug.apk
          [ -f artifacts/wear-release/app-release.apk ] && cp artifacts/wear-release/app-release.apk release-apks/forgelog-wear-release.apk
          [ -f artifacts/mobile-release-aab/app-release.aab ] && cp artifacts/mobile-release-aab/app-release.aab release-apks/forgelog-mobile-release.aab
          [ -f artifacts/wear-release-aab/app-release.aab ] && cp artifacts/wear-release-aab/app-release.aab release-apks/forgelog-wear-release.aab
          ls -la release-apks

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: Build from main at ${{ github.sha }}.
          artifacts: release-apks/*.apk,release-apks/*.aab
          allowUpdates: true
          makeLatest: true
          commit: main
