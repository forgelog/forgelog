name: Mobile

on:
  schedule:
    - cron: '17 2 * * *'
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'data/contracts/**'
      - '.github/workflows/mobile.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test --ci --coverage

      - name: Check coverage thresholds
        run: pnpm run check:coverage

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-jest-coverage
          path: apps/mobile/coverage/
          if-no-files-found: error

  native-wear-bridge:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Native Wear bridge tests
        id: native-wear-bridge-tests
        timeout-minutes: 45
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            cd apps/mobile/android
            ./gradlew :wear-sync:testDebugUnitTest :wear-sync:connectedDebugAndroidTest -PreactNativeArchitectures=x86_64 --stacktrace --continue

      - name: Native Wear bridge coverage
        id: native-wear-bridge-coverage
        if: always() && steps.native-wear-bridge-tests.outcome != 'skipped'
        timeout-minutes: 10
        working-directory: apps/mobile/android
        run: ./gradlew :wear-sync:koverXmlReportDebug :wear-sync:koverHtmlReportDebug :wear-sync:koverVerifyDebug --continue

      - name: Upload native Wear bridge coverage reports
        if: always() && steps.native-wear-bridge-coverage.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-wear-sync-kover-coverage
          path: apps/mobile/modules/wear-sync/android/build/reports/kover/
          if-no-files-found: error

      - name: Upload native Wear bridge failure reports
        if: failure() && steps.native-wear-bridge-tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-wear-bridge-test-failure-reports
          path: |
            apps/mobile/modules/wear-sync/android/build/reports/tests/
            apps/mobile/modules/wear-sync/android/build/reports/androidTests/
            apps/mobile/modules/wear-sync/android/build/outputs/androidTest-results/
            apps/mobile/modules/wear-sync/android/build/outputs/managed_device_android_test_additional_output/

  build-debug-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

  build-release-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          FORGELOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.FORGELOG_RELEASE_KEYSTORE_BASE64 }}
          FORGELOG_RELEASE_STORE_PASSWORD: ${{ secrets.FORGELOG_RELEASE_STORE_PASSWORD }}
          FORGELOG_RELEASE_KEY_ALIAS: ${{ secrets.FORGELOG_RELEASE_KEY_ALIAS }}
          FORGELOG_RELEASE_KEY_PASSWORD: ${{ secrets.FORGELOG_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "${FORGELOG_RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "$FORGELOG_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            export FORGELOG_RELEASE_STORE_FILE="$RUNNER_TEMP/release.jks"
          fi
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  maestro-pr:
    name: Maestro PR (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: build-release-apk
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: smoke
            flows: apps/mobile/.maestro/smoke.yaml
          - shard: workout-log
            flows: apps/mobile/.maestro/workout-log.yaml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: forgelog-release-apk
          path: artifacts/mobile-release

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro PR journeys
        id: maestro-pr
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            adb install -r artifacts/mobile-release/app-release.apk
            mkdir -p artifacts/maestro-pr/${{ matrix.shard }}
            mise exec maestro -- maestro test --format JUNIT --output artifacts/maestro-pr/${{ matrix.shard }}/junit.xml --debug-output artifacts/maestro-pr/${{ matrix.shard }}/debug --test-output-dir artifacts/maestro-pr/${{ matrix.shard }}/test-output ${{ matrix.flows }}

      - name: Upload Maestro PR failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-maestro-pr-${{ matrix.shard }}-failure
          path: artifacts/maestro-pr/${{ matrix.shard }}/

  maestro-nightly:
    name: Maestro nightly (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: build-release-apk
    # Temporary: run the full Maestro suite on the 0.1.3 release PR as well.
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.head_ref == 'chore/release-0.1.3')
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: profile
            flows: apps/mobile/.maestro/smoke.yaml apps/mobile/.maestro/first-launch-profile.yaml
          - shard: routines
            flows: apps/mobile/.maestro/routine-crud.yaml apps/mobile/.maestro/workout-recovery.yaml
          - shard: workout-log
            flows: apps/mobile/.maestro/workout-log.yaml
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Download release APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: forgelog-release-apk
          path: artifacts/mobile-release

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run nightly Maestro journeys
        id: maestro-nightly
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_APK: ${{ github.workspace }}/artifacts/mobile-release/app-release.apk
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            adb install -r artifacts/mobile-release/app-release.apk
            mkdir -p artifacts/maestro-nightly/${{ matrix.shard }}
            mise exec maestro -- maestro test --format JUNIT --output artifacts/maestro-nightly/${{ matrix.shard }}/junit.xml --debug-output artifacts/maestro-nightly/${{ matrix.shard }}/debug --test-output-dir artifacts/maestro-nightly/${{ matrix.shard }}/test-output ${{ matrix.flows }}

      - name: Upload nightly Maestro failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-maestro-nightly-${{ matrix.shard }}-failure
          path: |
            artifacts/maestro-nightly/${{ matrix.shard }}/

  build-release-aab:
    runs-on: ubuntu-latest
    needs: [test, native-wear-bridge]
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode release keystore
        env:
          FORGELOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.FORGELOG_RELEASE_KEYSTORE_BASE64 }}
        run: echo "$FORGELOG_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build release AAB
        working-directory: apps/mobile/android
        env:
          FORGELOG_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          FORGELOG_RELEASE_STORE_PASSWORD: ${{ secrets.FORGELOG_RELEASE_STORE_PASSWORD }}
          FORGELOG_RELEASE_KEY_ALIAS: ${{ secrets.FORGELOG_RELEASE_KEY_ALIAS }}
          FORGELOG_RELEASE_KEY_PASSWORD: ${{ secrets.FORGELOG_RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
