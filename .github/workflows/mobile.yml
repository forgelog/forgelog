name: Mobile

on:
  schedule:
    - cron: '17 2 * * *'
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'data/contracts/**'
      - 'internal-docs/schema.sql'
      - '.github/workflows/mobile.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Check generated files
        run: npm run check:generated

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx expo lint

      - name: Test
        run: npm test -- --ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android emulator
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          "$SDKMANAGER" --install "emulator"

      - name: Native Wear bridge tests
        id: native-wear-bridge-tests
        timeout-minutes: 45
        working-directory: apps/mobile/android
        run: ./gradlew :wear-sync:testDebugUnitTest :wear-sync:phoneApi34DebugAndroidTest -PreactNativeArchitectures=x86_64 --stacktrace --continue

      - name: Upload native Wear bridge failure reports
        if: failure() && steps.native-wear-bridge-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-wear-bridge-test-failure-reports
          path: |
            apps/mobile/modules/wear-sync/android/build/reports/tests/
            apps/mobile/modules/wear-sync/android/build/reports/androidTests/
            apps/mobile/modules/wear-sync/android/build/outputs/androidTest-results/
            apps/mobile/modules/wear-sync/android/build/outputs/managed_device_android_test_additional_output/

  build-debug-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgelog-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

  build-release-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          FORGELOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.FORGELOG_RELEASE_KEYSTORE_BASE64 }}
          FORGELOG_RELEASE_STORE_PASSWORD: ${{ secrets.FORGELOG_RELEASE_STORE_PASSWORD }}
          FORGELOG_RELEASE_KEY_ALIAS: ${{ secrets.FORGELOG_RELEASE_KEY_ALIAS }}
          FORGELOG_RELEASE_KEY_PASSWORD: ${{ secrets.FORGELOG_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "${FORGELOG_RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "$FORGELOG_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            export FORGELOG_RELEASE_STORE_FILE="$RUNNER_TEMP/release.jks"
          fi
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgelog-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  maestro-smoke:
    runs-on: ubuntu-latest
    needs: build-release-apk
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: forgelog-release-apk
          path: artifacts/mobile-release

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro PR journeys
        id: maestro-pr
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            set -eu
            adb install -r artifacts/mobile-release/app-release.apk
            mkdir -p artifacts/maestro-pr
            cd apps/mobile
            mise exec maestro -- maestro test \
              --format JUNIT \
              --output ../../artifacts/maestro-pr/junit.xml \
              --debug-output ../../artifacts/maestro-pr/debug \
              --test-output-dir ../../artifacts/maestro-pr/test-output \
              .maestro/smoke.yaml \
              .maestro/workout-log.yaml

      - name: Upload Maestro PR failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-maestro-pr-failure
          path: artifacts/maestro-pr/

  maestro-nightly:
    runs-on: ubuntu-latest
    needs: build-release-apk
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: forgelog-release-apk
          path: artifacts/mobile-release

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run nightly Maestro journeys
        id: maestro-nightly
        uses: reactivecircus/android-emulator-runner@v2
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_APK: ${{ github.workspace }}/artifacts/mobile-release/app-release.apk
          MAESTRO_OUTPUT_DIR: ${{ github.workspace }}/artifacts/maestro-migration
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            set -eu
            adb install -r artifacts/mobile-release/app-release.apk
            mkdir -p artifacts/maestro-nightly
            cd apps/mobile
            mise exec maestro -- maestro test \
              --format JUNIT \
              --output ../../artifacts/maestro-nightly/junit.xml \
              --debug-output ../../artifacts/maestro-nightly/debug \
              --test-output-dir ../../artifacts/maestro-nightly/test-output \
              .maestro/smoke.yaml \
              .maestro/first-launch-profile.yaml \
              .maestro/routine-crud.yaml \
              .maestro/workout-log.yaml \
              .maestro/workout-recovery.yaml
            cd ../..
            apps/mobile/scripts/run-maestro-migration.sh

      - name: Upload nightly Maestro failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-maestro-nightly-failure
          path: |
            artifacts/maestro-nightly/
            artifacts/maestro-migration/

  build-release-aab:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Decode release keystore
        env:
          FORGELOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.FORGELOG_RELEASE_KEYSTORE_BASE64 }}
        run: echo "$FORGELOG_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release AAB
        working-directory: apps/mobile/android
        env:
          FORGELOG_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          FORGELOG_RELEASE_STORE_PASSWORD: ${{ secrets.FORGELOG_RELEASE_STORE_PASSWORD }}
          FORGELOG_RELEASE_KEY_ALIAS: ${{ secrets.FORGELOG_RELEASE_KEY_ALIAS }}
          FORGELOG_RELEASE_KEY_PASSWORD: ${{ secrets.FORGELOG_RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: forgelog-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
