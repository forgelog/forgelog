name: Wear OS

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/wearos/**'
      - '.github/workflows/wearos.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wearos
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgelog-wear-debug-apk
          path: apps/wearos/app/build/outputs/apk/debug/app-debug.apk

  build-release-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/wearos
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forgelog-wear-release-apk
          path: apps/wearos/app/build/outputs/apk/release/app-release.apk
