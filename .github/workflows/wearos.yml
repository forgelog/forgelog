name: Wear OS

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/wearos/**'
      - 'data/contracts/**'
      - 'internal-docs/schema.sql'
      - '.github/workflows/wearos.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wearos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Unit tests and Kover coverage
        run: ./gradlew koverXmlReportDebug koverHtmlReportDebug koverVerifyDebug

      - name: Upload Kover coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wearos-kover-coverage
          path: apps/wearos/app/build/reports/kover/
          if-no-files-found: error

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android emulator
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          "$SDKMANAGER" --install "emulator"

      - name: Instrumentation tests
        id: instrumentation-tests
        run: ./gradlew wearApi34DebugAndroidTest --stacktrace

      - name: Upload instrumentation failure reports
        if: steps.instrumentation-tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wearos-android-test-failure-reports
          path: |
            apps/wearos/app/build/reports/androidTests/
            apps/wearos/app/build/outputs/androidTest-results/
            apps/wearos/app/build/outputs/managed_device_android_test_additional_output/

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-wear-debug-apk
          path: apps/wearos/app/build/outputs/apk/debug/app-debug.apk

  build-release-apk:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/wearos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-wear-release-apk
          path: apps/wearos/app/build/outputs/apk/release/app-release.apk

  build-release-aab:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/wearos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Decode release keystore
        env:
          FORGELOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.FORGELOG_RELEASE_KEYSTORE_BASE64 }}
        run: echo "$FORGELOG_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release AAB
        env:
          FORGELOG_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          FORGELOG_RELEASE_STORE_PASSWORD: ${{ secrets.FORGELOG_RELEASE_STORE_PASSWORD }}
          FORGELOG_RELEASE_KEY_ALIAS: ${{ secrets.FORGELOG_RELEASE_KEY_ALIAS }}
          FORGELOG_RELEASE_KEY_PASSWORD: ${{ secrets.FORGELOG_RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forgelog-wear-release-aab
          path: apps/wearos/app/build/outputs/bundle/release/app-release.aab
